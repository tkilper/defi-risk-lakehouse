# =============================================================================
# Trino — Iceberg catalog backed by Nessie (REST catalog) + MinIO (S3)
# Catalog name: "lakehouse"  (derived from this filename)
# =============================================================================

connector.name=iceberg

# ---------------------------------------------------------------------------
# Nessie as the Iceberg REST catalog
# Nessie 0.76+ exposes a full Iceberg REST catalog at /iceberg/v1
# ---------------------------------------------------------------------------
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://nessie:19120/iceberg/v1
iceberg.rest-catalog.warehouse=s3://lakehouse/warehouse

# ---------------------------------------------------------------------------
# File format defaults
# ---------------------------------------------------------------------------
iceberg.file-format=PARQUET
iceberg.compression-codec=SNAPPY

# ---------------------------------------------------------------------------
# MinIO — use Trino's native S3 filesystem (no Hadoop dependency)
# ---------------------------------------------------------------------------
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true
