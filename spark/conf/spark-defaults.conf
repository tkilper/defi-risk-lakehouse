# =============================================================================
# Spark defaults — Iceberg + Nessie + MinIO
# This file is mounted into both spark-master and spark-worker containers.
# =============================================================================

# ---------------------------------------------------------------------------
# Iceberg + Nessie JARs (resolved at startup via Ivy/Maven Central)
# ---------------------------------------------------------------------------
spark.jars.packages=org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.99.0,org.apache.iceberg:iceberg-aws-bundle:1.6.1

# Where Ivy downloads/caches JARs inside the container
spark.jars.ivy=/tmp/.ivy2

# ---------------------------------------------------------------------------
# SQL extensions
# ---------------------------------------------------------------------------
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

# ---------------------------------------------------------------------------
# Nessie catalog (name: "nessie")
# ---------------------------------------------------------------------------
spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.io-impl=org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.nessie.uri=http://nessie:19120/api/v2
spark.sql.catalog.nessie.ref=main
spark.sql.catalog.nessie.cache-enabled=false
spark.sql.catalog.nessie.warehouse=s3://lakehouse/warehouse

# Nessie S3FileIO settings (Iceberg's own S3 layer)
spark.sql.catalog.nessie.s3.endpoint=http://minio:9000
spark.sql.catalog.nessie.s3.path-style-access=true
spark.sql.catalog.nessie.s3.access-key-id=minioadmin
spark.sql.catalog.nessie.s3.secret-access-key=minioadmin
spark.sql.catalog.nessie.s3.region=us-east-1

# ---------------------------------------------------------------------------
# Hadoop S3A connector (used when reading raw JSON from s3a://lakehouse/raw/)
# ---------------------------------------------------------------------------
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=minioadmin
spark.hadoop.fs.s3a.secret.key=minioadmin
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.ssl.enabled=false
