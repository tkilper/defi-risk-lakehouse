version: 2

models:
  - name: int_positions_unified
    description: >
      UNION ALL of all three staging models.  One row per user × asset ×
      protocol × ingestion_date.  Used as the base for all downstream
      aggregations.
    columns:
      - name: user_address
        tests: [not_null]
      - name: protocol
        tests:
          - not_null
          - accepted_values:
              values: ["aave_v3", "compound_v3", "maker"]
      - name: collateral_usd
        tests: [not_null]
      - name: debt_usd
        tests: [not_null]
      - name: liquidation_threshold
        tests: [not_null]

  - name: int_collateral_weighted
    description: >
      Aggregated collateral and debt per (user_address, protocol, ingestion_date),
      with a collateral-weighted average liquidation threshold.
    columns:
      - name: user_address
        tests: [not_null]
      - name: protocol
        tests: [not_null]
      - name: total_collateral_usd
        tests: [not_null]
      - name: total_debt_usd
        tests: [not_null]
      - name: weighted_liq_threshold
        description: >
          Effective liquidation threshold for this account.
          Null only when total_collateral_usd = 0 (edge case, filtered downstream).
