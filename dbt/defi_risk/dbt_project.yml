name: defi_risk
version: "1.0.0"
config-version: 2

profile: defi_risk

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------------------
# Global model config
# ---------------------------------------------------------------------------
models:
  defi_risk:
    staging:
      +materialized: table
      +schema: silver

    intermediate:
      +materialized: table
      +schema: silver

    # Marts — physical Iceberg tables written by Trino INSERT INTO SELECT
    marts:
      +materialized: table
      +schema: gold
      +on_table_exists: replace   # dbt-trino: DROP + recreate on each run

# ---------------------------------------------------------------------------
# Seed config
# ---------------------------------------------------------------------------
seeds:
  defi_risk:
    +schema: gold
    +column_types:
      scenario_id: INTEGER
      eth_price_shock_pct: DOUBLE
      btc_price_shock_pct: DOUBLE
      stable_shock_pct: DOUBLE
