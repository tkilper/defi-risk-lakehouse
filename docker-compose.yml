
# ---------------------------------------------------------------------------
# Shared Airflow config applied to all Airflow services
# ---------------------------------------------------------------------------
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "defi-risk-secret-change-me"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Infrastructure endpoints
    MINIO_ENDPOINT: "http://minio:9000"
    MINIO_ACCESS_KEY: "minioadmin"
    MINIO_SECRET_KEY: "minioadmin"
    NESSIE_URI: "http://nessie:19120/api/v2"
    TRINO_HOST: "trino"
    TRINO_PORT: "8080"
    SPARK_MASTER: "spark://spark-master:7077"
    # DeFi API key (optional — The Graph free tier)
    GRAPH_API_KEY: "${GRAPH_API_KEY:-}"
    PYTHONPATH: "/opt/airflow"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - airflow-logs:/opt/airflow/logs
  networks:
    - defi-net
  depends_on:
    postgres:
      condition: service_healthy

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── PostgreSQL (Airflow metadata) ─────────────────────────────────────────
  postgres:
    image: postgres:16.3-alpine
    container_name: defi-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - defi-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: defi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio-data:/data
    networks:
      - defi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── MinIO bucket init (one-shot) ──────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: defi-minio-init
    networks:
      - defi-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing myminio/lakehouse;
        mc mb --ignore-existing myminio/lakehouse/raw;
        mc mb --ignore-existing myminio/lakehouse/warehouse;
        echo 'MinIO buckets ready.';
      "
    restart: "no"

  # ── Nessie (Iceberg REST catalog) ─────────────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    container_name: defi-nessie
    ports:
      - "19120:19120"  # REST API + Iceberg REST catalog
    environment:
      # Use IN_MEMORY for dev; switch to ROCKSDB + volume for persistence
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
      QUARKUS_HTTP_PORT: 19120
    networks:
      - defi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ── Trino (SQL query engine for dbt) ──────────────────────────────────────
  trino:
    image: trinodb/trino:443
    container_name: defi-trino
    ports:
      - "8081:8080"   # Trino UI → http://localhost:8081
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config/config.properties:/etc/trino/config.properties
      - ./trino/config/jvm.config:/etc/trino/jvm.config
      - ./trino/config/node.properties:/etc/trino/node.properties
      - ./trino/config/log.properties:/etc/trino/log.properties
    networks:
      - defi-net
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── Spark Master ──────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:latest
    container_name: defi-spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
    ports:
      - "7077:7077"   # Spark master
      - "8082:8080"   # Spark master UI → http://localhost:8082
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    networks:
      - defi-net
    restart: unless-stopped

  # ── Spark Worker ──────────────────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:latest
    container_name: defi-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    networks:
      - defi-net
    depends_on:
      - spark-master
    restart: unless-stopped

  # ── Airflow init (one-shot: db migrate + admin user) ──────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: defi-airflow-init
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin \
        || echo 'User already exists, skipping.'
      "
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: defi-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"   # Airflow UI → http://localhost:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: defi-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--local"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      trino:
        condition: service_healthy
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
  minio-data:
  airflow-logs:

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  defi-net:
    name: defi-net
    driver: bridge
