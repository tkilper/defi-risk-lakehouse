
# ---------------------------------------------------------------------------
# Shared Airflow config applied to all Airflow services
# ---------------------------------------------------------------------------
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "defi-risk-secret-change-me"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Infrastructure endpoints
    MINIO_ENDPOINT: "http://minio:9000"
    MINIO_ACCESS_KEY: "minioadmin"
    MINIO_SECRET_KEY: "minioadmin"
    NESSIE_URI: "http://nessie:19120/api/v2"
    TRINO_HOST: "trino"
    TRINO_PORT: "8080"
    SPARK_MASTER: "spark://spark-master:7077"
    # AWS SDK v2 (iceberg-aws-bundle) requires a region — no EC2 metadata in Docker
    AWS_REGION: "us-east-1"
    # DeFi API key (optional — The Graph free tier)
    GRAPH_API_KEY: "${GRAPH_API_KEY:-}"
    PYTHONPATH: "/opt/airflow"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - airflow-logs:/opt/airflow/logs
  networks:
    - defi-net
  depends_on:
    postgres:
      condition: service_healthy

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── PostgreSQL (Airflow metadata) ─────────────────────────────────────────
  postgres:
    image: postgres:16.3-alpine
    container_name: defi-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - defi-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: defi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio-data:/data
    networks:
      - defi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── MinIO bucket init (one-shot) ──────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: defi-minio-init
    networks:
      - defi-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing myminio/lakehouse;
        mc mb --ignore-existing myminio/lakehouse/raw;
        mc mb --ignore-existing myminio/lakehouse/warehouse;
        mc mb --ignore-existing myminio/mlflow;
        mc mb --ignore-existing myminio/dvc-artifacts;
        echo 'MinIO buckets ready.';
      "
    restart: "no"

  # ── Nessie (Iceberg REST catalog) ─────────────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    container_name: defi-nessie
    ports:
      - "19120:19120"  # REST API + Iceberg REST catalog
    environment:
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      QUARKUS_HTTP_PORT: 19120
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: default
      NESSIE_CATALOG_WAREHOUSES__DEFAULT__LOCATION: "s3://lakehouse/warehouse"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      AWS_REGION: "us-east-1"
    volumes:
      - ./nessie/application.properties:/deployments/config/application.properties:ro
      - nessie-data:/deployments/data
    networks:
      - defi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ── Trino (SQL query engine for dbt) ──────────────────────────────────────
  trino:
    image: trinodb/trino:443
    container_name: defi-trino
    ports:
      - "8081:8080"   # Trino UI → http://localhost:8081
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config/config.properties:/etc/trino/config.properties
      - ./trino/config/jvm.config:/etc/trino/jvm.config
      - ./trino/config/node.properties:/etc/trino/node.properties
      - ./trino/config/log.properties:/etc/trino/log.properties
    networks:
      - defi-net
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      start_period: 300s
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── Spark Master ──────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1
    container_name: defi-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "-h", "spark-master"]
    user: root
    environment:
      SPARK_MASTER_HOST: spark-master
    ports:
      - "7077:7077"   # Spark master
      - "8082:8080"   # Spark master UI → http://localhost:8082
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - defi-net
    restart: unless-stopped

  # ── Spark Worker ──────────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.1
    container_name: defi-spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    user: root
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: "2"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - defi-net
    depends_on:
      - spark-master
    restart: unless-stopped

  # ── MLflow (experiment tracking + model registry) ────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: defi-mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql://airflow:airflow@postgres/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"   # MLflow UI → http://localhost:5000
    networks:
      - defi-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── MLflow DB init (one-shot: create mlflow DB in postgres) ───────────────
  mlflow-db-init:
    image: postgres:16.3-alpine
    container_name: defi-mlflow-db-init
    networks:
      - defi-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: airflow
    entrypoint: >
      /bin/sh -c "
        psql -h postgres -U airflow -c 'CREATE DATABASE mlflow;' 2>/dev/null || echo 'mlflow DB already exists';
        echo 'MLflow DB ready.';
      "
    restart: "no"

  # ── Liquidation Predictor API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: defi-predictor-api
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: liquidation-predictor
      MODEL_STAGE: Production
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      POSTGRES_HOST: postgres
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "8000:8000"   # API → http://localhost:8000
    networks:
      - defi-net
    depends_on:
      - mlflow
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Airflow init (one-shot: db migrate + admin user) ──────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: defi-airflow-init
    command: >-
      bash -c "airflow db migrate &&
      (airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin
      || echo 'User already exists, skipping.')"
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: defi-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"   # Airflow UI → http://localhost:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: defi-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--local"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      trino:
        condition: service_healthy
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
  minio-data:
  nessie-data:
  airflow-logs:

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  defi-net:
    name: defi-net
    driver: bridge
